<!DOCTYPE html>
<html>
<head>
    <title>Workout Generator</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: #1e293b;
            padding: 30px;
            border-radius: 16px;
            width: 350px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
        }

        label {
            font-size: 14px;
            color: #94a3b8;
        }

        select, input[type="range"] {
            width: 100%;
            margin: 10px 0 20px 0;
        }

        input[type="range"] {
            appearance: none;
            height: 6px;
            background: #334155;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: #38bdf8;
            border-radius: 50%;
            cursor: pointer;
        }

        .value {
            text-align: right;
            margin-top: -15px;
            margin-bottom: 10px;
            font-size: 12px;
            color: #38bdf8;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #38bdf8;
            color: black;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #0ea5e9;
        }

        .card {
            margin-top: 20px;
            background: #020617;
            padding: 15px;
            border-radius: 12px;
        }

        ul {
            padding-left: 15px;
        }

        li {
            margin-bottom: 8px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Workout Generator</h1>

    <form method="POST">
        <label>Muscle Group</label>
        <select name="group">
            <option>Upper Body</option>
            <option>Lower Body</option>
            <option>Core</option>
        </select>

        <label>Energy Level</label>
        <input type="range" name="energy" min="1" max="10" value="5" oninput="energyValue.innerText = this.value">
        <div class="value">Energy: <span id="energyValue">5</span></div>

        <label>Time (minutes)</label>
        <input type="range" name="time" min="5" max="60" value="20" oninput="timeValue.innerText = this.value">
        <div class="value">Time: <span id="timeValue">20</span></div>

        <button type="submit">Generate Workout</button>
    </form>

    {% if workout %}
    <div class="card">
        <h2>Workout of the Day</h2>
        <ul>
            {% for ex, sets, duration in workout %}
            <li>{{ ex }} — {{ sets }} x {{ duration }}</li>
            {% endfor %}
        </ul>
    </div>
    {% endif %}
</div>

</body>
</html>
